name: LLM Task

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.12"
      fingerprint:
        description: "Fingerprint file path, relative to the github-infra repo root"
        type: string
        required: true
      src-dir:
        description: "Source directory to scan (relative to the project root)"
        type: string
        default: "src/"
      source-branch:
        description: "Branch to treat as the source for the pass"
        type: string
        default: ""
      working-branch:
        description: "Branch where the automated commits should be written"
        type: string
        default: ""
      base-branch:
        description: "Git ref to diff against for --changed-only"
        type: string
        default: "origin/main"
      model:
        description: "GitHub Models model ID"
        type: string
        default: "gpt-4o-mini"

permissions:
  contents: write
  models: read

jobs:
  llm-task:
    name: Run LLM task
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select working branch
        env:
          SOURCE_BRANCH: ${{ inputs.source-branch != '' && inputs.source-branch || github.ref_name }}
          WORKING_BRANCH: ${{ inputs.working-branch != '' && inputs.working-branch || inputs.source-branch != '' && inputs.source-branch || github.ref_name }}
        run: |
          git fetch origin "$SOURCE_BRANCH" --no-tags || true
          git fetch origin "$WORKING_BRANCH" --no-tags || true

          if git ls-remote --exit-code --heads origin "$WORKING_BRANCH" >/dev/null 2>&1; then
            git switch -C "$WORKING_BRANCH" "origin/$WORKING_BRANCH"
          else
            git switch -C "$WORKING_BRANCH" "origin/$SOURCE_BRANCH"
          fi

      - uses: actions/checkout@v4
        with:
          repository: importt-ant/github-infra
          ref: main
          path: .infra
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          pip install --quiet openai griffe
          pip install --quiet -e ".[dev]"

      - name: Fetch base branch for diff
        run: |
          BASE_REF="${{ inputs.base-branch }}"
          BASE_BRANCH="${BASE_REF#origin/}"
          git fetch origin "$BASE_BRANCH" --no-tags || true

      - name: Run LLM task
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .infra/scripts/run_llm_task/run_llm_task.py \
            --fingerprint ".infra/${{ inputs.fingerprint }}" \
            --src "${{ inputs.src-dir }}" \
            --model "${{ inputs.model }}" \
            --changed-only \
            --base "${{ inputs.base-branch }}"

      - name: Commit and push
        env:
          WORKING_BRANCH: ${{ inputs.working-branch != '' && inputs.working-branch || inputs.source-branch != '' && inputs.source-branch || github.ref_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.src-dir }}"
          FP_NAME=$(basename "${{ inputs.fingerprint }}" .md)
          if git diff --staged --quiet; then
            echo "No changes from ${FP_NAME}."
          else
            git commit -m "chore(llm): ${FP_NAME} pass [skip ci]"
            if git ls-remote --exit-code --heads origin "$WORKING_BRANCH" >/dev/null 2>&1; then
              git fetch origin "$WORKING_BRANCH"
              git push --force-with-lease origin "$WORKING_BRANCH"
            else
              git push --set-upstream origin "$WORKING_BRANCH"
            fi
          fi
