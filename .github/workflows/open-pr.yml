name: Open PR

on:
  workflow_call:
    inputs:
      head-branch:
        description: "Head branch for the pull request"
        type: string
        default: ""
      base-branch:
        description: "Base branch for the pull request"
        type: string
        default: "main"
      title:
        description: "Pull request title override"
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Open pull request
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN != '' && secrets.TEMPLATE_SYNC_TOKEN || github.token }}

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN != '' && secrets.TEMPLATE_SYNC_TOKEN || github.token }}
          HEAD_BRANCH: ${{ inputs.head-branch != '' && inputs.head-branch || github.ref_name }}
          PR_TITLE: ${{ inputs.title }}
        run: |
          EXISTING=$(gh pr list --head "$HEAD_BRANCH" --base "${{ inputs.base-branch }}" --json url --jq '.[0].url' 2>/dev/null || true)
          TITLE="${PR_TITLE:-chore: automated updates (${HEAD_BRANCH})}"

          if [ -n "$EXISTING" ]; then
            echo "PR already exists: $EXISTING"
            exit 0
          fi

          BODY=$(cat <<EOF
          ## Automated updates

          This PR was opened automatically.
          EOF
          )

          gh pr create \
            --head "$HEAD_BRANCH" \
            --base "${{ inputs.base-branch }}" \
            --title "$TITLE" \
            --body "$BODY"
