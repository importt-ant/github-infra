name: Python — Test & create GitHub release (reusable)

# ── Reusable workflow ─────────────────────────────────────────────────────────
#
# Runs tests on a tag push.  If they pass, creates a GitHub release.
# By default the release is created as a *draft* so you can review the
# auto-generated release notes before publishing.  Publishing the draft
# (either manually or by setting draft: false) will fire any workflow
# that listens on `release: types: [published]` — such as python-pypi-publish.
#
# Called from a project repo with:
#
#   jobs:
#     tag:
#       uses: importt-ant/github-infra/.github/workflows/python-test-release.yml@main
#       with:
#         draft: true        # optional — create as draft for manual review
#       secrets: inherit
#
on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to test with"
        type: string
        default: "3.12"
      install-extras:
        description: "pip extras to install, e.g. 'dev'"
        type: string
        default: "dev"
      draft:
        description: "Create the GitHub release as a draft (publish manually to trigger PyPI)"
        type: boolean
        default: true

permissions:
  contents: write   # create GitHub releases

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm reads the full tag history

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: pip install -e ".[${{ inputs.install-extras }}]"

      - name: Run tests
        run: pytest

  create-release:
    name: Create GitHub release
    needs: test   # only runs if tests pass
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft }}
          generate_release_notes: true
