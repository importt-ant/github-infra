name: Prepare for Release

# ── Reusable workflow ─────────────────────────────────────────────────────────
#
# Orchestrates the release-preparation passes by calling smaller reusable
# workflows in sequence: one LLM task per fingerprint, then ruff, then docs,
# then pull-request creation.
#
on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.12"
      fingerprints:
        description: |
          Newline-separated list of fingerprint file paths to run, relative to
          the github-infra repo root.  Example:
            fingerprints/standardize-docstrings.md
            fingerprints/standardize-comments.md
        type: string
        default: "fingerprints/standardize-docstrings.md"
      src-dir:
        description: "Source directory to scan (relative to the project root)"
        type: string
        default: "src/"
      source-branch:
        description: "Source branch that is being prepared for release"
        type: string
        default: ""
      working-branch:
        description: "Branch where groomed updates are written"
        type: string
        default: ""
      base-branch:
        description: "Git ref to diff against for --changed-only"
        type: string
        default: "origin/main"
      pr-base-branch:
        description: "Base branch for the pull request opened at the end"
        type: string
        default: "main"
      model:
        description: "GitHub Models model ID"
        type: string
        default: "gpt-4o-mini"
      run-doc-generator:
        description: "Run scripts/generate_docs/generate_docs.py after the LLM pass"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  setup:
    name: Parse fingerprints
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Build matrix JSON
        id: parse
        env:
          FINGERPRINTS: ${{ inputs.fingerprints }}
        run: |
          MATRIX=$(printf '%s' "$FINGERPRINTS" \
            | grep -v '^\s*$' \
            | jq -R . \
            | jq -sc .)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  seed-branch:
    name: Seed groom branch
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare groom branch
        env:
          SOURCE_BRANCH: ${{ inputs.source-branch != '' && inputs.source-branch || github.ref_name }}
          WORKING_BRANCH: ${{ inputs.working-branch != '' && inputs.working-branch || inputs.source-branch != '' && inputs.source-branch || github.ref_name }}
        run: |
          if [ "$SOURCE_BRANCH" = "$WORKING_BRANCH" ]; then
            echo "Working branch matches source branch; no grooming branch seeding needed."
            exit 0
          fi

          git fetch origin "$SOURCE_BRANCH" --no-tags
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -C "$WORKING_BRANCH" "origin/$SOURCE_BRANCH"
          git push --force-with-lease origin "$WORKING_BRANCH" || git push --set-upstream origin "$WORKING_BRANCH"

  llm-task:
    name: "LLM — ${{ matrix.fingerprint }}"
    needs: [setup, seed-branch]
    strategy:
      matrix:
        fingerprint: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 1
      fail-fast: false
    uses: importt-ant/github-infra/.github/workflows/llm-task.yml@main
    with:
      python-version: ${{ inputs.python-version }}
      fingerprint: ${{ matrix.fingerprint }}
      src-dir: ${{ inputs.src-dir }}
      source-branch: ${{ inputs.source-branch }}
      working-branch: ${{ inputs.working-branch }}
      base-branch: ${{ inputs.base-branch }}
      model: ${{ inputs.model }}
    secrets: inherit

  ruff:
    name: Ruff fix + format
    needs: llm-task
    if: always()
    uses: importt-ant/github-infra/.github/workflows/ruff.yml@main
    with:
      python-version: ${{ inputs.python-version }}
      src-dir: ${{ inputs.src-dir }}
      source-branch: ${{ inputs.source-branch }}
      working-branch: ${{ inputs.working-branch }}
    secrets: inherit

  generate-docs:
    name: Generate docs
    needs: ruff
    if: ${{ always() && inputs.run-doc-generator }}
    uses: importt-ant/github-infra/.github/workflows/generate-docs.yml@main
    with:
      python-version: ${{ inputs.python-version }}
      src-dir: ${{ inputs.src-dir }}
      source-branch: ${{ inputs.source-branch }}
      working-branch: ${{ inputs.working-branch }}
    secrets: inherit

  open-pr:
    name: Open pull request
    needs: [llm-task, ruff, generate-docs]
    if: always()
    uses: importt-ant/github-infra/.github/workflows/open-pr.yml@main
    with:
      fingerprints: ${{ inputs.fingerprints }}
      head-branch: ${{ inputs.working-branch != '' && inputs.working-branch || inputs.source-branch != '' && inputs.source-branch || github.ref_name }}
      base-branch: ${{ inputs.pr-base-branch }}
      title: "${{ format('chore: groom {0}', inputs.pr-base-branch) }}"
    secrets: inherit
