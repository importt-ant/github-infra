name: Dispatch Template Updates

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      template-ref:
        description: "Tag or ref from github-infra to dispatch to template consumers"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  dispatch:
    name: Notify template consumers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dispatch template updates
        env:
          GITHUB_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          TEMPLATE_OWNER: importt-ant
          TEMPLATE_REPO: importt-ant/github-infra
          TEMPLATE_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs['template-ref'] || 'main' }}
        run: python scripts/dispatch_template_updates.py
